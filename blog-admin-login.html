<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Letsdo Blog Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/blog-admin.css">
</head>
<body class="blog-admin-body">
    <main class="blog-admin-login-wrap">
        <section class="blog-admin-panel blog-admin-login-card">
            <p class="blog-admin-kicker">Letsdo Creative</p>
            <div class="blog-admin-title">
                <h1>Blog Admin Login</h1>
            </div>
            <p class="blog-admin-muted mt-3">Sign in to manage posts, categories, tags, and AI-assisted article drafting.</p>
            <form id="blog-admin-login-form" class="blog-admin-form mt-4">
                <div class="blog-admin-field">
                    <label for="blog-admin-email">Email</label>
                    <input id="blog-admin-email" name="email" class="blog-admin-input" type="email" required>
                </div>
                <div class="blog-admin-field">
                    <label for="blog-admin-password">Password</label>
                    <input id="blog-admin-password" name="password" class="blog-admin-input" type="password" required>
                </div>
                <div id="blog-admin-login-feedback" class="blog-admin-feedback d-none"></div>
                <button class="blog-admin-button" type="submit">Sign In</button>
            </form>
        </section>
    </main>
    <script src="assets/js/blog-admin-login.js"></script>
</body>
</html>
