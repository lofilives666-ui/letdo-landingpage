services:
  postgres:
    image: postgres:16
    container_name: canteen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: canteen
    ports:
      - "5432:5432"
    volumes:
      - canteen_pg_data:/var/lib/postgresql/data

volumes:
  canteen_pg_data:

